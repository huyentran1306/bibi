<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px;">
  <div class="label-eyebrow" style="margin-bottom:10px;">Accents — soft highlights for emotional beats</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;">
    <div><div class="swatch" style="background:var(--mint);"></div><div class="swatch-label"><span class="swatch-name">Mint</span><span class="swatch-val">#C8F0DD</span></div></div>
    <div><div class="swatch" style="background:var(--peach);"></div><div class="swatch-label"><span class="swatch-name">Peach</span><span class="swatch-val">#FFCDB2</span></div></div>
    <div><div class="swatch" style="background:var(--butter);"></div><div class="swatch-label"><span class="swatch-name">Butter</span><span class="swatch-val">#FFE899</span></div></div>
  </div>
</body></html>
