<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px;">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;">
    <div><div class="swatch" style="background:var(--paper); border:1px solid var(--line);"></div><div class="swatch-label"><span class="swatch-name">Paper</span><span class="swatch-val">#FFF8F3</span></div></div>
    <div><div class="swatch" style="background:var(--ink);"></div><div class="swatch-label"><span class="swatch-name">Ink</span><span class="swatch-val">#4B2E5C</span></div></div>
    <div><div class="swatch" style="background:var(--ink-2);"></div><div class="swatch-label"><span class="swatch-name">Ink soft</span><span class="swatch-val">#7A6A8B</span></div></div>
    <div><div class="swatch" style="background:var(--ink-3);"></div><div class="swatch-label"><span class="swatch-name">Ink muted</span><span class="swatch-val">#B5A8C2</span></div></div>
  </div>
  <div style="margin-top:14px; font-size:12px; color:var(--fg-muted); line-height:1.5;">Ink is deep aubergine, never #000. Sits gently on pastel without harshness.</div>
</body></html>
