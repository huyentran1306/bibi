<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px;">
  <div class="label-eyebrow" style="margin-bottom:10px;">Pink scale — 50 → 400</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px;">
    <div><div class="swatch" style="height:70px; background:var(--pink-50);"></div><div class="swatch-val" style="margin-top:6px;">50 · #FFF1F4</div></div>
    <div><div class="swatch" style="height:70px; background:var(--pink-100);"></div><div class="swatch-val" style="margin-top:6px;">100 · #FFD3DE</div></div>
    <div><div class="swatch" style="height:70px; background:var(--pink-200);"></div><div class="swatch-val" style="margin-top:6px;">200 · #FFB6C8</div></div>
    <div><div class="swatch" style="height:70px; background:var(--pink-300);"></div><div class="swatch-val" style="margin-top:6px;">300 · #FF95B0</div></div>
    <div><div class="swatch" style="height:70px; background:var(--pink-400);"></div><div class="swatch-val" style="margin-top:6px;">400 · #F47A9A</div></div>
  </div>
  <div class="label-eyebrow" style="margin:18px 0 10px;">Lavender scale — 50 → 300</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
    <div><div class="swatch" style="height:70px; background:var(--lav-50);"></div><div class="swatch-val" style="margin-top:6px;">50 · #F4ECFF</div></div>
    <div><div class="swatch" style="height:70px; background:var(--lav-100);"></div><div class="swatch-val" style="margin-top:6px;">100 · #E6D6FF</div></div>
    <div><div class="swatch" style="height:70px; background:var(--lav-200);"></div><div class="swatch-val" style="margin-top:6px;">200 · #D4B5FF</div></div>
    <div><div class="swatch" style="height:70px; background:var(--lav-300);"></div><div class="swatch-val" style="margin-top:6px;">300 · #B891FF</div></div>
  </div>
</body></html>
