<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:30px; background:var(--paper);">
  <div class="label-eyebrow" style="margin-bottom:18px;">Tinted shadows — never gray</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:24px;">
    <div style="text-align:center;"><div style="width:88px; height:88px; margin:0 auto; background:#fff; border-radius:20px; box-shadow: var(--shadow-soft);"></div><div class="swatch-val" style="margin-top:10px;">soft pink</div></div>
    <div style="text-align:center;"><div style="width:88px; height:88px; margin:0 auto; background:#fff; border-radius:20px; box-shadow: var(--shadow-glow-pk);"></div><div class="swatch-val" style="margin-top:10px;">glow pink</div></div>
    <div style="text-align:center;"><div style="width:88px; height:88px; margin:0 auto; background:#fff; border-radius:20px; box-shadow: var(--shadow-glow-lv);"></div><div class="swatch-val" style="margin-top:10px;">glow lavender</div></div>
    <div style="text-align:center;"><div style="width:88px; height:88px; margin:0 auto; background:#fff; border-radius:20px; box-shadow: var(--shadow-lift);"></div><div class="swatch-val" style="margin-top:10px;">lift</div></div>
  </div>
</body></html>
