<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .chip { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius: var(--r-full); font-family: var(--font-sans); font-weight:500; font-size:13px; border:1px solid transparent; }
  .chip.pink { background: var(--pink-100); color: #8B3A55; }
  .chip.blue { background: var(--blue-100); color: #2A5C99; }
  .chip.lav  { background: var(--lav-100);  color: #5C3A99; }
  .chip.cream{ background: var(--cream-100);color: #8B6A28; }
  .chip.mint { background: var(--mint);     color: #2D7A55; }
  .chip.outline { background: transparent; border-color: rgba(75,46,92,0.18); color: var(--ink-2); }
</style>
</head>
<body style="padding:24px;">
  <div class="label-eyebrow" style="margin-bottom:14px;">Tags & chips</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <span class="chip pink">✨ year 1</span>
    <span class="chip blue">📚 sleepless deadlines</span>
    <span class="chip lav">💼 internship era</span>
    <span class="chip cream">🎓 graduation</span>
    <span class="chip mint">🥹 forever friends</span>
    <span class="chip outline">+ add memory</span>
  </div>
</body></html>
