<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--paper); }
  .pol { width:200px; background:#fff; padding:14px 14px 18px; border-radius:6px; box-shadow: var(--shadow-lift); transform: rotate(-3deg); position:relative; }
  .pol.two { transform: rotate(2deg); margin-left: -10px; }
  .pol.three { transform: rotate(-1deg); }
  .ph { width:172px; height:172px; border-radius:4px; background: linear-gradient(135deg, var(--pink-200), var(--lav-200)); display:flex; align-items:center; justify-content:center; font-size:48px; }
  .pol.two .ph { background: linear-gradient(135deg, var(--blue-200), var(--mint)); }
  .pol.three .ph { background: linear-gradient(135deg, var(--cream-200), var(--peach)); }
  .cap { font-family: var(--font-hand); font-size: 20px; color: var(--ink); text-align:center; margin-top:10px; }
  .tape { position:absolute; top:-12px; left:50%; transform:translateX(-50%) rotate(-4deg); width:80px; height:18px; background: rgba(181,216,255,0.7); border-radius:2px; }
</style>
</head>
<body style="padding:30px;">
  <div style="display:flex; gap:14px;">
    <div class="pol"><div class="tape"></div><div class="ph">🌸</div><div class="cap">deadline survivors</div></div>
    <div class="pol two"><div class="tape" style="background:rgba(255,182,200,0.7);"></div><div class="ph">☕</div><div class="cap">canteen memories</div></div>
    <div class="pol three"><div class="tape" style="background:rgba(212,181,255,0.7);"></div><div class="ph">📚</div><div class="cap">group project warriors</div></div>
  </div>
</body></html>
