<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--paper); }
  .pill { display:inline-flex; align-items:center; gap:10px; padding:10px 16px 10px 12px; background: var(--bg-glass); backdrop-filter: blur(14px); border:1px solid rgba(75,46,92,0.08); border-radius: var(--r-full); box-shadow: var(--shadow-soft), var(--inner-glow); cursor:pointer; transition: all 280ms var(--ease-bounce); }
  .pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow-pk), var(--inner-glow); }
  .pill .ic { width:32px; height:32px; border-radius:9999px; background: var(--pink-200); display:flex; align-items:center; justify-content:center; color: var(--ink); }
  .pill .lab { font-family: var(--font-sans); font-weight:600; font-size:13px; color: var(--ink); }
  svg.icon { width:18px; height:18px; }
</style>
</head>
<body style="padding:24px;">
  <div class="label-eyebrow" style="margin-bottom:14px;">Floating chrome (top-right of site)</div>
  <div style="display:flex; gap:10px;">
    <button class="pill"><span class="ic" style="background:var(--lav-200);"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span><span class="lab">music · on</span></button>
    <button class="pill"><span class="ic" style="background:var(--cream-200);"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></span><span class="lab">light</span></button>
  </div>
</body></html>
