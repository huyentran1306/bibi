<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family: var(--font-sans); font-weight:600; border:none; cursor:pointer; transition: all 280ms var(--ease-bounce); display:inline-flex; align-items:center; gap:10px; }
  .btn-primary { background: var(--pink-300); color:#fff; padding:14px 26px; font-size:16px; border-radius: var(--r-full); box-shadow: var(--shadow-glow-pk), var(--inner-glow); }
  .btn-primary:hover { transform: translateY(-3px) rotate(-1.5deg); box-shadow: 0 14px 50px rgba(255,149,176,0.55), var(--inner-glow); }
  .btn-secondary { background: var(--bg-glass); color: var(--ink); padding:12px 22px; font-size:15px; border-radius: var(--r-full); border:1px solid rgba(75,46,92,0.1); backdrop-filter: blur(12px); }
  .btn-ghost { background: transparent; color: var(--ink); padding:10px 18px; font-size:14px; }
  .arrow { font-size: 18px; }
</style>
</head>
<body style="padding:24px;">
  <div class="label-eyebrow" style="margin-bottom:14px;">Buttons</div>
  <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
    <button class="btn btn-primary">Open Future <span class="arrow">→</span></button>
    <button class="btn btn-secondary">Leave a Message</button>
    <button class="btn btn-ghost">skip ↓</button>
  </div>
  <div style="margin-top:16px; font-size:12px; color:var(--fg-muted); line-height:1.5;">Hover: lift 3px + soft rotate. Press: scale 0.96 + softer shadow. Pill radius always for primary CTAs.</div>
</body></html>
