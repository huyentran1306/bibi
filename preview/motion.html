<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(80px)} }
  .dot { width:24px; height:24px; border-radius:9999px; background:var(--pink-300); box-shadow: var(--shadow-glow-pk); animation: drift 3.2s var(--ease-bounce) infinite; }
  .dot.b { background:var(--lav-300); box-shadow: var(--shadow-glow-lv); animation-timing-function: var(--ease-out); animation-duration: 3.2s; }
  .dot.c { background:var(--blue-300); animation-timing-function: var(--ease-soft); animation-duration: 3.2s; }
</style>
</head>
<body style="padding:24px;">
  <div class="label-eyebrow" style="margin-bottom:14px;">Motion · easing</div>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:center; gap:18px;"><div class="dot"></div><div style="font-size:13px; color:var(--fg-soft);"><b>bounce</b> · cubic-bezier(0.34, 1.56, 0.64, 1) · default playful</div></div>
    <div style="display:flex; align-items:center; gap:18px;"><div class="dot b"></div><div style="font-size:13px; color:var(--fg-soft);"><b>out</b> · cubic-bezier(0.16, 1, 0.3, 1) · reveals & fades</div></div>
    <div style="display:flex; align-items:center; gap:18px;"><div class="dot c"></div><div style="font-size:13px; color:var(--fg-soft);"><b>soft</b> · cubic-bezier(0.4, 0, 0.2, 1) · subtle state</div></div>
  </div>
</body></html>
