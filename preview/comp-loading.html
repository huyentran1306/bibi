<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: linear-gradient(180deg, var(--pink-100) 0%, var(--cream-100) 100%); }
  @keyframes bobble { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(2deg)} }
  @keyframes dots { 0%{opacity:.3} 30%{opacity:1} 60%{opacity:.3} 100%{opacity:.3} }
  .mas { animation: bobble 1.6s var(--ease-bounce) infinite; }
  .d { display:inline-block; width:8px; height:8px; border-radius:9999px; background:var(--ink); margin:0 2px; animation: dots 1.2s infinite; }
  .d:nth-child(2){animation-delay:0.2s}
  .d:nth-child(3){animation-delay:0.4s}
</style>
</head>
<body style="padding:24px; display:flex; align-items:center; gap:24px;">
  <img src="../assets/mascot.svg" class="mas" width="100" height="100" alt="">
  <div>
    <div style="font-family:var(--font-display); font-size:32px; color:var(--ink); line-height:1;">loading the memories</div>
    <div style="margin-top:10px;"><span class="d"></span><span class="d"></span><span class="d"></span></div>
    <div style="margin-top:6px; font-family:var(--font-hand); font-size:18px; color:var(--ink-2);">đợi tí nha 💖</div>
  </div>
</body></html>
